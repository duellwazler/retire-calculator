// helpers
// ─────────────────────────────────────────────────────────────────────────
const fmtS = (v, t) => {
  const n = Math.abs(v);
  if (n >= 1e6) return `${(v / 1e6).toFixed(1)}${t.unitMShort}`;
  if (n >= 1e3) return `${Math.round(v / 1e3)}${t.unitK}`;
  return `${Math.round(v)}`;
};
const fmtTHB = (v, t) => {
  if (Math.abs(v) >= 1e6) return `฿${(v / 1e6).toFixed(2)}${t.unitM === 'M' ? 'M' : ' ' + t.unitM}`;
  return `฿${Math.round(v).toLocaleString(t.locale)}`;
};

// ─────────────────────────────────────────────────────────────────────────
// Chart (lightweight SVG, no deps)
// ─────────────────────────────────────────────────────────────────────────
function Chart({ data, dataKey, color, h = 190, t }) {
  const [hover, setHover] = useState(null);
  const svgRef = useRef(null);
  if (!data || !data.length) return null;
  const W = 300, H = h, pL = 46, pR = 8, pT = 8, pB = 26, cW = W - pL - pR, cH = H - pT - pB;
  const vals = data.map(d => d[dataKey]);
  const maxV = Math.max(...vals) || 1;
  const xs = i => pL + (i / (data.length - 1 || 1)) * cW;
  const ys = v => pT + cH - (v / maxV) * cH;
  const pts = data.map((d, i) => `${xs(i)},${ys(d[dataKey])}`).join(' L ');
  const yTicks = [0, .25, .5, .75, 1].map(tt => ({ v: maxV * tt, y: pT + cH * (1 - tt) }));
  const xLbls = data.filter((d, i) => d.age % 10 === 0 || i === 0 || i === data.length - 1);
  const onMove = useCallback(e => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const idx = Math.max(0, Math.min(data.length - 1, Math.round((cx / rect.width * W - pL) / cW * (data.length - 1))));
    setHover(idx);
  }, [data.length]);
  const hd = hover !== null ? data[hover] : null;
  return (
    <div style={{ position: 'relative' }}>
      <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', display: 'block', cursor: 'crosshair' }}
        onMouseMove={onMove} onTouchMove={onMove}
        onMouseLeave={() => setHover(null)} onTouchEnd={() => setHover(null)}>
        <defs>
          <linearGradient id={`g${dataKey}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity=".4" />
            <stop offset="100%" stopColor={color} stopOpacity=".02" />
          </linearGradient>
        </defs>
        {yTicks.map((tk, i) => (
          <g key={i}>
            <line x1={pL} y1={tk.y} x2={W - pR} y2={tk.y} stroke="#1a2d45" strokeDasharray="3 3" />
            <text x={pL - 4} y={tk.y + 4} textAnchor="end" fill="#334155" fontSize="9">{fmtS(tk.v, t)}</text>
          </g>
        ))}
        <path d={`M ${pts} L ${xs(data.length - 1)},${pT + cH} L ${pL},${pT + cH} Z`} fill={`url(#g${dataKey})`} />
        <path d={`M ${pts}`} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
        {xLbls.map((d, i) => {
          const idx = data.findIndex(x => x.age === d.age);
          return <text key={i} x={xs(idx)} y={H - 4} textAnchor="middle" fill="#334155" fontSize="9">{d.age}</text>;
        })}
        {hover !== null && hd && (<>
          <line x1={xs(hover)} y1={pT} x2={xs(hover)} y2={pT + cH} stroke={color} strokeWidth="1" strokeDasharray="4 3" opacity=".6" />
          <circle cx={xs(hover)} cy={ys(hd[dataKey])} r="4" fill={color} stroke="#070f1e" strokeWidth="2" />
        </>)}
      </svg>
      {hd && (
        <div style={{
          position: 'absolute', top: 6,
          left: hover > data.length * .6 ? 'auto' : `calc(${(xs(hover) / W) * 100}% + 6px)`,
          right: hover > data.length * .6 ? `calc(${((W - xs(hover)) / W) * 100}% + 6px)` : 'auto',
          background: '#060d1c', border: '1px solid #1e3a5f', borderRadius: 8,
          padding: '7px 10px', fontSize: 12, pointerEvents: 'none', zIndex: 10, whiteSpace: 'nowrap',
        }}>
          <div style={{ color, fontWeight: 800, marginBottom: 2 }}>{t.tooltipAge(hd.age, hd.ph)}</div>
          <div style={{ color: '#e2e8f0' }}>{fmtTHB(hd[dataKey], t)}</div>
        </div>
      )}
    </div>
  );
}

function Slider({ label, value, min, max, step, onChange, display, note }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
        <span style={{ color: '#94a3b8', fontSize: 13 }}>{label}</span>
        <span style={{ color: '#FBBF24', fontWeight: 800, fontSize: 15 }}>{display(value)}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(Number(e.target.value))} />
      {note && <div style={{ color: '#334155', fontSize: 11, marginTop: 5 }}>{note}</div>}
    </div>
  );
}

function Kpi({ label, value, sub, color = '#e2e8f0', border = '#1e3a5f', bg = '#0f1e35' }) {
  return (
    <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 12, padding: '13px 14px' }}>
      <div style={{ color: '#475569', fontSize: 11, marginBottom: 5, lineHeight: 1.3 }}>{label}</div>
      <div style={{ color, fontSize: 17, fontWeight: 900, lineHeight: 1.2 }}>{value}</div>
      {sub && <div style={{ color: '#334155', fontSize: 11, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function TabBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      flex: 1, padding: '10px 2px',
      background: active ? '#FBBF24' : 'transparent',
      color: active ? '#000' : '#475569',
      border: 'none', borderRadius: 8,
      fontWeight: active ? 800 : 500, fontSize: 12, cursor: 'pointer',
    }}>{label}</button>
  );
}

function LangBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      padding: '5px 10px',
      background: active ? '#FBBF24' : '#0f1e35',
      color: active ? '#000' : '#64748b',
      border: `1px solid ${active ? '#FBBF24' : '#1e3a5f'}`,
      borderRadius: 7,
      fontWeight: active ? 800 : 600, fontSize: 11, cursor: 'pointer',
    }}>{label}</button>
  );
}

function Sec({ title, children }) {
  return (
    <div style={{ background: '#0f1e35', border: '1px solid #1e3a5f', borderRadius: 14, padding: '18px 16px', marginBottom: 14 }}>
      <div style={{ fontSize: 10, color: '#334155', letterSpacing: 2.5, textTransform: 'uppercase', marginBottom: 18 }}>{title}</div>
      {children}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState(() => {
    try {
      const saved = localStorage.getItem('retire45-lang');
      if (saved && I18N[saved]) return saved;
      const nav = (navigator.language || 'th').toLowerCase();
      if (nav.startsWith('ja')) return 'ja';
      if (nav.startsWith('en')) return 'en';
    } catch (e) {}
    return 'th';
  });
  useEffect(() => { try { localStorage.setItem('retire45-lang', lang); } catch (e) {} }, [lang]);
  const t = I18N[lang];

  const [tab, setTab]   = useState(0);
  const [curAge, setCur] = useState(35);
  const [retAge, setRet] = useState(45);
  const [mo, setMo]     = useState(50000);
  const [sav, setSav]   = useState(5000000);
  const [rPct, setRP]   = useState(6);
  const [iPct, setIP]   = useState(3);
  const [swr, setSwr]   = useState(3.5);

  const base = mo * 12, req = base / (swr / 100), gap = sav - req;
  const realR = ((1 + rPct / 100) / (1 + iPct / 100) - 1) * 100;
  const yL = Math.max(0, retAge - curAge);
  const r = rPct / 100 / 12, n = yL * 12, FV = Math.max(0, -gap);
  const needSave = FV > 0 && n > 0 ? (FV * r) / (Math.pow(1 + r, n) - 1) : 0;

  const sim = useMemo(() => {
    const out = []; let cap = sav;
    for (let age = retAge; age <= 100; age++) {
      const pd = PHASE_DEF.find(p => age >= p.range[0] && age < p.range[1]) ?? PHASE_DEF[4];
      const ph = t.phases[pd.id];
      const yr = age - retAge;
      const exp = base * pd.mul * Math.pow(1 + iPct / 100, yr);
      cap = cap * (1 + rPct / 100) - exp;
      out.push({ age, ph: ph.th, capital: Math.max(0, Math.round(cap)), monthly: Math.round(exp / 12), gone: cap <= 0 });
      if (cap <= 0) break;
    }
    return out;
  }, [retAge, mo, sav, rPct, iPct, base, lang]);

  const goneAt = sim.find(d => d.gone)?.age;
  const ok = !goneAt;

  return (
    <div style={{ minHeight: '100vh', paddingBottom: 24 }}>
      {/* Header */}
      <div style={{ padding: '20px 16px 14px', background: 'linear-gradient(160deg,#0c1a32,#0a2040)', borderBottom: '1px solid #1e3a5f' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 5 }}>
          <div style={{ fontSize: 9, letterSpacing: 3.5, color: '#FBBF24', textTransform: 'uppercase', maxWidth: '70%' }}>{t.eyebrow}</div>
          <div style={{ display: 'flex', gap: 5 }}>
            <LangBtn label="TH" active={lang === 'th'} onClick={() => setLang('th')} />
            <LangBtn label="EN" active={lang === 'en'} onClick={() => setLang('en')} />
            <LangBtn label="JP" active={lang === 'ja'} onClick={() => setLang('ja')} />
          </div>
        </div>
        <h1 style={{ fontSize: 22, fontWeight: 900 }}>{t.title(retAge)}</h1>
        <p style={{ color: '#334155', fontSize: 12, marginTop: 4 }}>{t.tagline}</p>
      </div>

      {/* Banner */}
      <div style={{
        margin: '14px 14px 0', padding: '12px 14px', borderRadius: 12,
        background: ok ? '#021a12' : '#1f0606', border: `1px solid ${ok ? '#34D399' : '#f06060'}`,
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <span style={{ fontSize: 26 }}>{ok ? '✅' : '⚠️'}</span>
        <div style={{ flex: 1 }}>
          <div style={{ color: ok ? '#34D399' : '#f06060', fontWeight: 800, fontSize: 14 }}>
            {ok ? t.bannerOk : t.bannerFail(goneAt, 100 - goneAt)}
          </div>
          <div style={{ color: '#334155', fontSize: 11, marginTop: 2 }}>
            {gap >= 0 ? t.bannerOkSub(fmtTHB(gap, t)) : t.bannerFailSub(fmtTHB(Math.abs(gap), t), fmtTHB(needSave, t))}
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ margin: '14px 14px', display: 'flex', gap: 4, padding: 4, background: '#0f1e35', borderRadius: 12, border: '1px solid #1e3a5f' }}>
        <TabBtn label={t.tabSetup}   active={tab === 0} onClick={() => setTab(0)} />
        <TabBtn label={t.tabResults} active={tab === 1} onClick={() => setTab(1)} />
        <TabBtn label={t.tabLife}    active={tab === 2} onClick={() => setTab(2)} />
      </div>

      <div style={{ padding: '0 14px' }}>

        {tab === 0 && (<>
          <Sec title={t.secPersonal}>
            <Slider label={t.curAge} value={curAge} min={20} max={65} step={1}
              onChange={v => { setCur(v); if (v >= retAge) setRet(v + 1); }} display={t.ageUnit} />
            <Slider label={t.retAge} value={retAge} min={35} max={70} step={1}
              onChange={v => setRet(Math.max(v, curAge + 1))} display={t.ageUnit}
              note={yL > 0 ? t.yearsLeft(yL) : t.readyNow} />
          </Sec>
          <Sec title={t.secExpense}>
            <Slider label={t.monthlyExp} value={mo} min={20000} max={200000} step={5000}
              onChange={setMo} display={v => `฿${(v / 1000).toFixed(0)}K`} note={t.monthlyExpNote} />
            <Slider label={t.savings} value={sav} min={0} max={50000000} step={500000}
              onChange={setSav} display={v => v >= 1e6 ? `฿${(v / 1e6).toFixed(1)}${t.unitM === 'M' ? 'M' : ' ' + t.unitM}` : `฿${(v / 1e3).toFixed(0)}K`} />
          </Sec>
          <Sec title={t.secFinance}>
            <Slider label={t.retReturn} value={rPct} min={2} max={12} step={0.5}
              onChange={setRP} display={v => `${v}%`} note={t.retReturnNote} />
            <Slider label={t.inflation} value={iPct} min={1} max={7} step={0.5}
              onChange={setIP} display={v => `${v}%`} note={t.inflationNote} />
            <Slider label={t.swr} value={swr} min={2.5} max={5} step={0.5}
              onChange={setSwr} display={v => `${v}%`} note={t.swrNote} />
            <div style={{ background: '#060d1c', borderRadius: 8, padding: '10px 12px', fontSize: 12, color: '#475569' }}>
              💡 {t.realReturnLabel}: <span style={{ color: '#60A5FA', fontWeight: 800 }}>{realR.toFixed(1)}%</span>
              {'  ·  '}{t.annualExpLabel}: <span style={{ color: '#FBBF24', fontWeight: 800 }}>{fmtTHB(base, t)}</span>
            </div>
          </Sec>
        </>)}

        {tab === 1 && (<>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
            <Kpi label={t.kpi1Label} value={fmtTHB(req, t)}
              sub={t.kpi1Sub(swr, (mo / 1e3).toFixed(0))}
              color="#FBBF24" border="#FBBF2433" bg="#1a1200" />
            <Kpi label={gap >= 0 ? t.kpi2LabelOk : t.kpi2LabelFail} value={fmtTHB(Math.abs(gap), t)}
              sub={gap >= 0 ? t.kpi2SubOk : t.kpi2SubFail(`฿${fmtS(needSave, t)}`)}
              color={gap >= 0 ? '#34D399' : '#f06060'}
              border={gap >= 0 ? '#34D39933' : '#f0606033'}
              bg={gap >= 0 ? '#021a12' : '#1f0606'} />
            <Kpi label={t.kpi3Label} value={goneAt ? t.kpi3ValueFail(goneAt) : t.kpi3ValueOk}
              sub={goneAt ? t.kpi3SubFail(100 - goneAt) : t.kpi3SubOk}
              color={goneAt ? '#f06060' : '#34D399'}
              border={goneAt ? '#f0606033' : '#34D39933'}
              bg={goneAt ? '#1f0606' : '#021a12'} />
            <Kpi label={t.kpi4Label} value={`${realR.toFixed(1)}%`}
              sub={t.kpi4Sub(rPct, iPct)}
              color="#60A5FA" border="#60A5FA33" bg="#0c1d3b" />
          </div>
          <div style={{ background: '#0f1e35', border: '1px solid #1e3a5f', borderRadius: 14, padding: '14px 10px 12px', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: '#475569', marginBottom: 10, paddingLeft: 4 }}>
              {t.chart1Title(retAge, sim[sim.length - 1]?.age || 100)}
            </div>
            <Chart data={sim} dataKey="capital" color="#FBBF24" h={190} t={t} />
          </div>
          <div style={{ background: '#0f1e35', border: '1px solid #1e3a5f', borderRadius: 14, padding: '14px 10px 12px' }}>
            <div style={{ fontSize: 11, color: '#475569', marginBottom: 10, paddingLeft: 4 }}>{t.chart2Title}</div>
            <Chart data={sim} dataKey="monthly" color="#FB923C" h={160} t={t} />
          </div>
        </>)}

        {tab === 2 && (<>
          <div style={{ background: '#0f1e35', border: '1px solid #1e3a5f', borderRadius: 14, padding: '16px 14px', marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: '#475569', marginBottom: 12 }}>{t.lifeSectionTitle}</div>
            <div style={{ display: 'flex', borderRadius: 8, overflow: 'hidden', height: 32, marginBottom: 12 }}>
              {PHASE_DEF.map(pd => {
                const s = Math.max(pd.range[0], retAge), e = Math.min(pd.range[1], 101);
                if (e <= retAge) return null;
                const w = ((e - s) / (101 - retAge)) * 100;
                return (
                  <div key={pd.id} style={{
                    width: `${w}%`, background: pd.color, flexShrink: 0,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 10, fontWeight: 800, color: '#000',
                  }}>{s}</div>
                );
              })}
            </div>
            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              {PHASE_DEF.map(pd => (
                <div key={pd.id} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: pd.color }} />
                  <span style={{ color: '#64748b' }}>{t.phases[pd.id].th}</span>
                </div>
              ))}
            </div>
          </div>

          {PHASE_DEF.map(pd => {
            const s = Math.max(pd.range[0], retAge), e = Math.min(pd.range[1] - 1, 100);
            if (e < retAge) return null;
            const midYr = Math.round((s + e) / 2) - retAge;
            const expMo = Math.round(mo * pd.mul * Math.pow(1 + iPct / 100, Math.max(0, midYr)));
            const simMid = sim.find(d => d.age === Math.round((s + e) / 2));
            const ph = t.phases[pd.id];
            return (
              <div key={pd.id} style={{ background: pd.bg, border: `1px solid ${pd.color}44`, borderRadius: 14, padding: 16, marginBottom: 12 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                  <div>
                    <div style={{ color: pd.color, fontWeight: 900, fontSize: 16 }}>{ph.th}</div>
                    <div style={{ color: '#334155', fontSize: 12 }}>{t.ageRange(s, e, pd.mul)}</div>
                  </div>
                  <div style={{ textAlign: 'right' }}>
                    <div style={{ color: '#e2e8f0', fontWeight: 900, fontSize: 20 }}>฿{fmtS(expMo, t)}</div>
                    <div style={{ color: '#334155', fontSize: 11 }}>{t.perMonthShort}</div>
                  </div>
                </div>
                <div style={{ color: '#64748b', fontSize: 12, marginBottom: 10 }}>{ph.desc}</div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                  {[
                    { l: t.perYear, v: `฿${fmtS(expMo * 12, t)}`, c: '#e2e8f0' },
                    { l: t.vsBase, v: `+${Math.round((pd.mul - 1) * 100)}%`, c: pd.color },
                    { l: t.midPortfolio, v: simMid ? `฿${fmtS(simMid.capital, t)}` : t.depleted, c: simMid ? '#60A5FA' : '#f06060' },
                  ].map(({ l, v, c }) => (
                    <div key={l} style={{ background: '#00000030', borderRadius: 8, padding: '8px 10px' }}>
                      <div style={{ color: '#334155', fontSize: 10, marginBottom: 3 }}>{l}</div>
                      <div style={{ color: c, fontWeight: 800, fontSize: 13 }}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          <div style={{ background: '#0f1e35', border: '1px solid #1e3a5f', borderRadius: 14, padding: '16px 14px', marginTop: 4 }}>
            <div style={{ fontSize: 10, color: '#334155', letterSpacing: 2.5, textTransform: 'uppercase', marginBottom: 14 }}>{t.checklistTitle}</div>
            {[
              { e: '💰', cat: t.catFinance, c: '#FBBF24', items: t.itemsFinance(fmtTHB(req, t)) },
              { e: '🏥', cat: t.catHealth, c: '#34D399', items: t.itemsHealth },
              { e: '📋', cat: t.catLegal, c: '#C084FC', items: t.itemsLegal },
            ].map(({ e, cat, c, items }) => (
              <div key={cat} style={{ marginBottom: 16 }}>
                <div style={{ color: c, fontWeight: 800, fontSize: 13, marginBottom: 8 }}>{e} {cat}</div>
                {items.map(item => (
                  <div key={item} style={{ display: 'flex', gap: 8, padding: '6px 0', borderBottom: '1px solid #1e3a5f', color: '#94a3b8', fontSize: 12 }}>
                    <span style={{ color: '#34D399', flexShrink: 0 }}>✓</span>{item}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </>)}

      </div>
      <div style={{ textAlign: 'center', padding: '16px', color: '#1e3a5f', fontSize: 10 }}>{t.footer}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('SW ok'))
      .catch(e => console.warn('SW error', e));
  });
}
</script>
</body>
</html>
